# Production Configuration for Render
server.port=${PORT:8080}
spring.application.name=exam-portal

# Database (H2 in-memory for free tier, use PostgreSQL for paid tier)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (disable in production)
spring.h2.console.enabled=false

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://exam-backend-ai9k.onrender.com,https://exam-nlp-service.onrender.com,http://localhost:3000}

# NLP Service
nlp.service.url=${NLP_SERVICE_URL}

# Logging
logging.level.root=INFO
logging.level.com.examportal=DEBUG
