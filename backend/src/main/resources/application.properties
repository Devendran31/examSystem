# Application
spring.application.name=exam-portal
server.port=8080

# H2 Database (default - in-memory)
spring.datasource.url=jdbc:h2:mem:examdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL Configuration (uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/examdb?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# For MySQL use: org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=ExamPortalSecretKey2024CloudBasedNLPAutoEvaluationSystem
app.jwt.expiration=86400000

# NLP Service URL
nlp.service.url=http://localhost:5000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500

# Logging
logging.level.com.examportal=INFO
logging.level.org.springframework.security=WARN
